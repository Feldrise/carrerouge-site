name: Deploy Carrerouge to VPS (Production)

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: carrerouge
  DEPLOY_PATH: /opt/carrerouge

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Lowercase repository owner and image name
        id: lowercase
        run: |
          echo "repo_owner=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
          echo "image_name=$(echo '${{ env.IMAGE_NAME }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Log in to the container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_owner }}/${{ steps.lowercase.outputs.image_name }}
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/Dockerfile.prod
          target: runner
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy deployment files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: docker/docker-compose.prod.yml
          target: ${{ env.DEPLOY_PATH }}
          strip_components: 1
          overwrite: true

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e

            mkdir -p "${{ env.DEPLOY_PATH }}"
            cd "${{ env.DEPLOY_PATH }}"

            echo "${{ secrets.GH_TOKEN }}" | docker login ${{ env.REGISTRY }} -u "${{ github.actor }}" --password-stdin

            IMAGE="${{ env.REGISTRY }}/${{ steps.lowercase.outputs.repo_owner }}/${{ steps.lowercase.outputs.image_name }}:latest"
            sed -i "s|image: .*carrerouge:.*|image: ${IMAGE}|g" docker-compose.prod.yml

            docker compose -f docker-compose.prod.yml pull carrerouge
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f

            echo "Checking application health..."
            sleep 20

            if docker compose -f docker-compose.prod.yml ps | grep -q "carrerouge-prod.*Up"; then
              echo "Carrerouge is running."
              if command -v curl > /dev/null 2>&1; then
                curl -f http://localhost:3000/ > /dev/null
              fi
            else
              echo "Deployment problem detected."
              docker compose -f docker-compose.prod.yml logs carrerouge
              exit 1
            fi

      - name: Deployment status notification
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "Carrerouge deployment succeeded."
          else
            echo "Carrerouge deployment failed."
          fi
