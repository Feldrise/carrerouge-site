name: carrerouge

services:
  carrerouge:
    build:
      context: ..
      dockerfile: docker/Dockerfile.prod
      target: runner
    container_name: carrerouge-local
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=256
      PORT: 3000
    ports:
      - "3000:3000"
    mem_limit: 384m
    cpus: 1.0
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
